{{ define "main" }}
    <article class="post">
        <h1 class="post-title">{{ .Title }}</h1>
        <div class="post-date">
            📅 {{ .PublishDate.Format "2006 年 1 月 2 日" }}
            {{ if .Params.location }}
                📍 {{ .Params.location }}
            {{ end }}
        </div>
        <div class="post-content" style="margin-top: 2rem; font-size: 1.1rem; line-height: 1.9;">
            {{ .Content }}
        </div>
        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #ddd; text-align: center; color: #666;">
            <p><a href="/">← 回到首頁</a></p>
        </div>
    </article>
{{ end }}
