{{ define "main" }}
    <section class="post-list">
        {{ range .Pages.ByPublishDate.Reverse }}
            <article class="post-card">
                <h2 class="post-title">
                    <a href="{{ .Permalink }}">{{ .Title }}</a>
                </h2>
                <div class="post-date">
                    📅 {{ .PublishDate.Format "2006 年 1 月 2 日" }}
                </div>
                <div class="post-content">
                    {{ .Summary }}
                    {{ if .Truncated }}
                        <a href="{{ .Permalink }}">繼續閱讀 →</a>
                    {{ end }}
                </div>
            </article>
        {{ end }}
        
        {{ if eq (len .Pages) 0 }}
            <div style="text-align: center; padding: 2rem; color: #999;">
                <p style="font-size: 3rem;">🦞</p>
                <p>還沒有旅遊日記呢～ 敬請期待蝦蝦的冒險故事！</p>
            </div>
        {{ end }}
    </section>
{{ end }}
